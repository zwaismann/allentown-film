      - generic [ref=e52]:
        - paragraph [ref=e53]: A film that lives in the space between absurdity and heartbreak, where the biggest laughs come from the most desperate circumstances and the most moving moments sneak up on you sideways.
        - paragraph [ref=e54]: A comedy about survival. A drama about dignity. And a love letter to the people who build their lives with whatever they've got.
    - generic [ref=e58]:
      - paragraph [ref=e59]: A note from the director
      - paragraph [ref=e60]: "I've been developing Allentown for several years now, and the thing that keeps pulling me back is how much this story feels like right now. In 1982, three ordinary guys climbed a billboard because it was the only path to something most Americans take for granted: a place to call home."
      - paragraph [ref=e61]: That's the story I want to tell. Not a period piece about the '80s, but a film about what happens when the ground falls out from under you and the only direction left is up. Literally.
