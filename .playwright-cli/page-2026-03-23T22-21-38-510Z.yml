      - paragraph [ref=e60]: A note from the director
      - paragraph [ref=e61]: "I've been developing Allentown for several years now, and the thing that keeps pulling me back is how much this story feels like right now. In 1982, three ordinary guys climbed a billboard because it was the only path to something most Americans take for granted: a place to call home."
