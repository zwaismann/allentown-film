      - generic [ref=e13]:
        - paragraph [ref=e14]: Practical Info
        - heading "How Much Does Detox Cost? A Realistic Breakdown" [level=1] [ref=e15]
        - paragraph [ref=e16]: Detox costs range from free to $25,000 or more. Here is what you can actually expect to pay for inpatient, outpatient, and rapid detox, what insurance covers, and how to find affordable options.
      - generic [ref=e18]: Scroll to learn more
    - generic [ref=e21]:
      - generic [ref=e22]:
        - paragraph [ref=e23]: The Big Picture
        - heading "The Short Answer" [level=2] [ref=e24]
      - generic [ref=e25]:
        - paragraph [ref=e26]: Detox can cost anywhere from nothing to $25,000 or more. The price depends on the type of program, the substance involved, how long you need medical supervision, and whether you have insurance.
        - paragraph [ref=e27]: "Here is a quick overview of what different detox options typically cost:"
        - list [ref=e29]:
          - listitem [ref=e30]:
            - strong [ref=e31]: "Inpatient medical detox:"
            - text: $1,000 to $1,500 per day, typically 3 to 7 days ($3,000 to $10,000+ total)
          - listitem [ref=e32]:
            - strong [ref=e33]: "Outpatient detox:"
            - text: $1,000 to $5,000 total, depending on length and services
          - listitem [ref=e34]:
            - strong [ref=e35]: "Rapid detox (under anesthesia):"
            - text: $10,000 to $25,000+
          - listitem [ref=e36]:
            - strong [ref=e37]: "State-funded or free programs:"
            - text: $0, though wait times may apply
          - listitem [ref=e38]:
            - strong [ref=e39]: "With insurance:"
            - text: Often just your copay or deductible
        - paragraph [ref=e40]: The biggest factors that affect your cost are the substance you are detoxing from (alcohol and benzodiazepine detox require more intensive monitoring), how long you have been using, whether you have co-occurring medical or mental health conditions, and the facility you choose.
        - paragraph [ref=e41]: Do not let the numbers above discourage you. Most people pay far less than the sticker price, and many pay nothing at all. Keep reading for the full breakdown.
    - generic [ref=e43]:
      - generic [ref=e44]:
        - paragraph [ref=e45]: Highest Level of Care
        - heading "Inpatient Medical Detox Cost" [level=2] [ref=e46]
      - generic [ref=e47]:
        - paragraph [ref=e48]: Inpatient medical detox is the most intensive and most expensive option. You stay at a facility 24/7 with round-the-clock medical supervision. Typical costs run $1,000 to $1,500 per day.
        - paragraph [ref=e49]: Most inpatient detox stays last 3 to 7 days, though some can extend to 10 days or longer for alcohol or benzodiazepine withdrawal. That puts total costs in the range of $3,000 to $10,000 or more before insurance.
        - heading "What Is Included" [level=3] [ref=e50]
        - paragraph [ref=e51]: "The daily rate at most inpatient facilities typically covers:"
        - list [ref=e53]:
          - listitem [ref=e54]: 24/7 medical monitoring by nurses and physicians
          - listitem [ref=e55]: Medications for withdrawal symptom management
          - listitem [ref=e56]: Vital sign checks and medical assessments
          - listitem [ref=e57]: Meals and a safe, supervised environment
          - listitem [ref=e58]: Initial psychiatric evaluation
          - listitem [ref=e59]: Discharge planning and aftercare referrals
        - paragraph [ref=e60]:
          - text: Inpatient detox is recommended for
          - link "alcohol withdrawal" [ref=e61] [cursor=pointer]:
            - /url: /alcohol-detox/
          - text: (which can cause life-threatening seizures), benzodiazepine withdrawal, and severe opioid dependence, especially when previous outpatient attempts have not worked. If you are unsure what level of care you need, our
          - link "withdrawal symptoms guide" [ref=e62] [cursor=pointer]:
            - /url: /withdrawal-symptoms/
          - text: can help you gauge severity.
        - paragraph [ref=e63]: Luxury or private detox facilities can charge $2,000 to $5,000 per day or more, but the medical care is not necessarily better. Focus on accreditation, staff credentials, and whether the facility uses evidence-based protocols.
    - generic [ref=e65]:
      - generic [ref=e66]:
        - paragraph [ref=e67]: Lower Cost Option
        - heading "Outpatient Detox Cost" [level=2] [ref=e68]
      - generic [ref=e69]:
        - paragraph [ref=e70]: Outpatient detox lets you receive medical supervision during the day while returning home at night. It typically costs $1,000 to $5,000 total, making it significantly less expensive than inpatient care.
        - paragraph [ref=e71]: In an outpatient program, you visit a clinic daily or several times per week for medication management, vital sign monitoring, and check-ins with medical staff. Some programs also include counseling or group sessions.
        - heading "Who Outpatient Detox Is Right For" [level=3] [ref=e72]
        - paragraph [ref=e73]: "Outpatient detox works best when you have a stable home environment, a support person who can stay with you, and a substance and usage pattern that does not require 24/7 monitoring. It is commonly used for:"
        - list [ref=e75]:
          - listitem [ref=e76]:
            - link "Opioid detox" [ref=e77] [cursor=pointer]:
              - /url: /opioid-detox/
            - text: using medication-assisted treatment (Suboxone or methadone)
          - listitem [ref=e78]: Mild to moderate alcohol dependence (not severe or long-term heavy use)
          - listitem [ref=e79]: Situations where you need to continue working or caring for family
          - listitem [ref=e80]: Follow-up care after a short inpatient stabilization
        - paragraph [ref=e81]: Outpatient detox is not recommended for severe alcohol dependence, benzodiazepine withdrawal, or anyone with a history of withdrawal seizures or delirium tremens. For those situations, inpatient care is safer.
        - paragraph [ref=e82]: The cost advantage is real, but safety comes first. Your doctor or a SAMHSA helpline counselor can help you determine the right level of care.
    - generic [ref=e84]:
      - generic [ref=e85]:
        - paragraph [ref=e86]: Accelerated Approach
        - heading "Rapid Detox Cost" [level=2] [ref=e87]
      - generic [ref=e88]:
        - paragraph [ref=e89]: Rapid detox is the most expensive option, typically costing $10,000 to $25,000 or more. The procedure places you under general anesthesia while medications flush opioids from your receptors.
        - paragraph [ref=e90]: The high price tag reflects the cost of general anesthesia, an anesthesiologist, intensive care-level monitoring, the specialized facility, and the medical team required for the procedure. Most programs also include a short post-procedure observation period.
        - heading "Why It Costs So Much" [level=3] [ref=e91]
        - list [ref=e93]:
          - listitem [ref=e94]: General anesthesia and anesthesiologist fees
          - listitem [ref=e95]: Intensive medical monitoring during and after the procedure
          - listitem [ref=e96]: Specialized medications (naltrexone, naloxone)
          - listitem [ref=e97]: Hospital or surgical center facility fees
          - listitem [ref=e98]: Limited availability of providers who perform the procedure
        - paragraph [ref=e99]: Most insurance plans do not cover rapid detox because many medical organizations consider it experimental or not yet supported by enough evidence to recommend over standard approaches. You should expect to pay out of pocket.
        - paragraph [ref=e100]:
          - text: Before choosing rapid detox based on the appeal of a faster process, read our full
          - link "rapid detox guide" [ref=e101] [cursor=pointer]:
            - /url: /rapid-detox/
          - text: to understand the risks, benefits, and what the research actually shows about long-term outcomes.
    - generic [ref=e103]:
      - generic [ref=e104]:
        - paragraph [ref=e105]: Coverage & Benefits
        - heading "Does Insurance Cover Detox?" [level=2] [ref=e106]
      - generic [ref=e107]:
        - paragraph [ref=e108]: "Yes, most insurance plans are required to cover substance abuse treatment, including medical detox. Two federal laws make this possible: the Affordable Care Act (ACA) and the Mental Health Parity and Addiction Equity Act."
        - paragraph [ref=e109]: Under the ACA, substance abuse treatment is one of the ten essential health benefits that most plans must cover. The parity act requires insurers to cover addiction treatment at the same level as other medical and surgical conditions, with no extra limitations on visits, copays, or deductibles.
      - generic [ref=e110]:
        - generic [ref=e111]:
          - generic [ref=e112]: Private Insurance
          - heading "Employer & Marketplace Plans" [level=4] [ref=e113]
          - paragraph [ref=e114]: Most private plans cover medical detox. You will typically pay your standard deductible, copay, or coinsurance. In-network facilities cost less than out-of-network. Call the number on your insurance card to verify coverage and find in-network providers.
        - generic [ref=e115]:
          - generic [ref=e116]: Government Programs
          - heading "Medicaid & Medicare" [level=4] [ref=e117]
          - paragraph [ref=e118]: Medicaid covers detox in most states, often with little or no out-of-pocket cost. Medicare Part A covers inpatient detox, and Part B covers outpatient services. Coverage specifics vary by state for Medicaid and by plan for Medicare Advantage.
        - generic [ref=e119]:
          - generic [ref=e120]: Military & VA
          - heading "TRICARE & VA Benefits" [level=4] [ref=e121]
          - paragraph [ref=e122]: TRICARE covers medically necessary detox and substance abuse treatment. The VA provides detox services to eligible veterans, often at no cost. Contact your local VA medical center or call the Veterans Crisis Line at 988 (press 1).
        - generic [ref=e123]:
          - generic [ref=e124]: No Insurance
          - heading "Uninsured Options" [level=4] [ref=e125]
          - paragraph [ref=e126]: If you do not have insurance, you still have options. State-funded programs, sliding-scale facilities, and nonprofit treatment centers provide detox services regardless of your ability to pay. Scroll down for more on free and low-cost resources.
      - generic [ref=e127]:
        - heading "How to Verify Your Coverage" [level=3] [ref=e128]
        - paragraph [ref=e129]: "Before entering a program, take these steps to understand what your insurance will cover:"
        - list [ref=e131]:
          - listitem [ref=e132]: Call the member services number on the back of your insurance card
          - listitem [ref=e133]: Ask specifically about "medical detoxification" and "substance abuse treatment" benefits
          - listitem [ref=e134]: Ask whether the facility you are considering is in-network or out-of-network
          - listitem [ref=e135]: Ask about your deductible, copay, and any pre-authorization requirements
          - listitem [ref=e136]: Ask about length-of-stay limits and whether the plan covers medications used during detox
          - listitem [ref=e137]: Get the answers in writing or take detailed notes with the representative's name
        - paragraph [ref=e138]: Many treatment facilities also have admissions staff who will verify your insurance for you. Do not be afraid to ask them to check before you commit.
    - generic [ref=e140]:
      - generic [ref=e141]:
        - paragraph [ref=e142]: Affordable Alternatives
        - heading "Free and Low-Cost Detox Options" [level=2] [ref=e143]
      - generic [ref=e144]:
        - paragraph [ref=e145]: If you do not have insurance or cannot afford your out-of-pocket costs, there are real options available. Every state has publicly funded treatment programs, and many facilities offer services on a sliding scale based on your income.
        - heading "Where to Find Free or Reduced-Cost Detox" [level=3] [ref=e146]
        - list [ref=e148]:
          - listitem [ref=e149]:
            - strong [ref=e150]: "SAMHSA's National Helpline (1-800-662-4357):"
            - text: Free, confidential, 24/7. They can connect you with state-funded programs and low-cost facilities in your area
          - listitem [ref=e151]:
            - strong [ref=e152]: "FindTreatment.gov:"
            - text: SAMHSA's online locator lets you filter by "payment assistance available" to find facilities that accept clients regardless of ability to pay
          - listitem [ref=e153]:
            - strong [ref=e154]: "State-funded treatment programs:"
            - text: Every state receives federal block grant funding for substance abuse treatment. Contact your state's substance abuse agency for referrals
          - listitem [ref=e155]:
            - strong [ref=e156]: "Medicaid:"
            - text: If your income qualifies, Medicaid covers detox in most states. Many facilities can help you apply on the spot
          - listitem [ref=e157]:
            - strong [ref=e158]: "Medicare:"
            - text: Covers both inpatient and outpatient detox for eligible individuals 65 and older or those with qualifying disabilities
          - listitem [ref=e159]:
            - strong [ref=e160]: "Community health centers:"
            - text: Federally Qualified Health Centers (FQHCs) are required to serve patients regardless of ability to pay, and many offer substance abuse services
          - listitem [ref=e161]:
            - strong [ref=e162]: "Nonprofit and faith-based programs:"
            - text: Organizations like the Salvation Army and local nonprofits operate free or donation-based detox and recovery programs
          - listitem [ref=e163]:
            - strong [ref=e164]: "Sliding-scale facilities:"
            - text: Many private treatment centers adjust their fees based on your income. Ask about financial assistance before assuming you cannot afford care
        - paragraph [ref=e165]:
          - text: Wait times for free programs can be longer than for private facilities. If you need help now, call SAMHSA at
          - link "1-800-662-4357" [ref=e166] [cursor=pointer]:
            - /url: tel:18006624357
          - text: to find the fastest available option near you.
    - generic [ref=e168]:
      - generic [ref=e169]:
        - paragraph [ref=e170]: What to Ask Upfront
        - heading "Hidden Costs to Watch For" [level=2] [ref=e171]
      - generic [ref=e172]:
        - paragraph [ref=e173]: The quoted price for detox does not always include everything. Before you commit to a program, ask about these common additional charges so you are not caught off guard.
        - list [ref=e175]:
          - listitem [ref=e176]:
            - strong [ref=e177]: "Medications:"
            - text: Some facilities bill detox medications separately. Ask whether withdrawal management drugs like Suboxone, benzodiazepines, or anti-nausea medication are included in the daily rate
          - listitem [ref=e178]:
            - strong [ref=e179]: "Lab work and testing:"
            - text: Blood tests, urine drug screens, and liver panels are standard during detox. Confirm whether these are part of the program cost or billed separately
          - listitem [ref=e180]:
            - strong [ref=e181]: "Medical consultations:"
            - text: If you see a psychiatrist, specialist, or physician outside the core detox team, those visits may generate separate charges
          - listitem [ref=e182]:
            - strong [ref=e183]: "Aftercare and transition planning:"
            - text: Some programs include post-detox planning, while others charge for it. Ask what happens when detox ends
          - listitem [ref=e184]:
            - strong [ref=e185]: "Extended stays:"
            - text: If your detox takes longer than expected (which is common), know whether the daily rate continues or whether a different rate applies
          - listitem [ref=e186]:
            - strong [ref=e187]: "Out-of-network charges:"
            - text: Even if a facility takes your insurance, individual providers (like an anesthesiologist for rapid detox) may be out-of-network
        - paragraph [ref=e188]: The best way to protect yourself is to ask for a written estimate that includes all anticipated charges before you start. A reputable facility will be transparent about costs. If they are not willing to discuss pricing clearly, that is worth noting.
        - paragraph [ref=e189]:
          - text: For a broader look at what happens during and after detox, read our
          - link "detox timeline guide" [ref=e190] [cursor=pointer]:
            - /url: /detox-timeline/
          - text: . If you are considering managing withdrawal on your own to save money, please read our
          - link "guide to detoxing at home" [ref=e191] [cursor=pointer]:
            - /url: /detox-at-home/
          - text: first to understand the risks.
    - generic [ref=e193]:
      - generic [ref=e194]:
        - paragraph [ref=e195]: The Most Important Thing
        - heading "Cost Should Not Stop You" [level=2] [ref=e196]
      - generic [ref=e197]:
        - paragraph [ref=e198]: "If you are reading this page because you are worried about affording detox, here is what matters most: options exist at every price point, including free. The cost of not getting help is always higher."
        - paragraph [ref=e199]: Untreated addiction costs more than any detox program. Emergency room visits, legal problems, lost income, damaged relationships, and declining health all carry price tags that compound over time. Detox is an investment in stopping that cycle.
        - paragraph [ref=e200]: "Here is what you can do right now:"
        - list [ref=e202]:
          - listitem [ref=e203]:
            - text: Call SAMHSA at
            - link "1-800-662-4357" [ref=e204] [cursor=pointer]:
              - /url: tel:18006624357
            - text: to find programs in your area, including free options
          - listitem [ref=e205]: If you have insurance, call the number on your card and ask about detox coverage
          - listitem [ref=e206]:
            - text: Visit
            - link "FindTreatment.gov" [ref=e207] [cursor=pointer]:
              - /url: https://findtreatment.gov
            - text: to search for facilities that offer payment assistance
          - listitem [ref=e208]: Ask any facility you are considering about sliding-scale fees or financial assistance programs
          - listitem [ref=e209]: If you qualify, apply for Medicaid, which covers detox in most states
        - paragraph [ref=e210]: You deserve to get better regardless of what is in your bank account. The system is complicated, but help is available. Start with one phone call.
    - generic [ref=e214]:
      - generic [ref=e215]:
        - paragraph [ref=e216]: You Don't Have to Do This Alone
        - heading "Ready to Talk to Someone?" [level=2] [ref=e217]
        - paragraph [ref=e218]: These free, confidential resources are available 24/7. No insurance needed, no commitment required. Just a conversation.
      - generic [ref=e219]:
        - generic [ref=e220]:
          - heading "SAMHSA National Helpline" [level=3] [ref=e221]
          - link "1-800-662-4357" [ref=e222] [cursor=pointer]:
            - /url: tel:18006624357
          - paragraph [ref=e223]: Free, confidential, 24/7 treatment referral and information. Available in English and Spanish.
        - generic [ref=e224]:
          - heading "Crisis Text Line" [level=3] [ref=e225]
          - paragraph [ref=e226]:
            - text: Text
            - strong [ref=e227]: HOME
            - text: to
            - strong [ref=e228]: "741741"
          - paragraph [ref=e229]: Free, 24/7 crisis support via text message. Trained counselors available anytime.
        - generic [ref=e230]:
          - heading "988 Suicide & Crisis Lifeline" [level=3] [ref=e231]
          - link "988" [ref=e232] [cursor=pointer]:
            - /url: tel:988
          - paragraph [ref=e233]: Call or text. For anyone in emotional distress, including substance-related crises.
